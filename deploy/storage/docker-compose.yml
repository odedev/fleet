services:
  mysql:
    image: mysql:8.0.31
    environment:
      MYSQL_ROOT_PASSWORD: "root"
    volumes:
      - ./mysql/config:/etc/mysql/conf.d
      - ./mysql/data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    ports:
      - "3306:3306"
    hostname: mysql
    networks:
      - net
    privileged: true
    restart: always
    user: root
    command: --default-authentication-plugin=mysql_native_password

  neo4j:
    image: neo4j:5.1.0-community
    volumes:
      - ./neo4j/data:/data
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    hostname: neo4j
    networks:
      - net
    restart: always
    user: root

networks:
  net:
    ipam:
      driver: default
      config:
        - subnet: 10.10.0.0/24
