services:
  nginx:
    image: nginx:1.25.3
    volumes:
      - ./nginx/config/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/data:/usr/share/nginx/html
    ports:
      - "80:80"
      - "443:443"
    hostname: nginx
    networks:
      - net
    privileged: true
    restart: always
    user: root

networks:
  net:
    ipam:
      driver: default
      config:
        - subnet: 10.10.0.0/24
